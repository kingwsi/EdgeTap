name: Release EdgeTap

on:
  push:
    tags:
      - 'v*' # Trigger on tags starting with 'v', e.g., v1.0.0

jobs:
  build_and_release:
    name: Build & Release macOS App
    runs-on: macos-latest

    permissions:
      contents: write # Need permission to create a release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0' # Adjust based on your compatibility needs

      - name: Make Build Script Executable
        run: chmod +x build_app.sh

      - name: Build the Application
        run: ./build_app.sh

      - name: Create ZIP Archive
        run: |
          # Get version from git tag without the 'v' prefix
          VERSION=${GITHUB_REF#refs/tags/v}
          ZIP_NAME="EdgeTap-${VERSION}.zip"
          
          # Compress the .app preserving resource forks and symlinks
          ditto -c -k --sequesterRsrc --keepParent EdgeTap.app ${ZIP_NAME}
          
          # Pass filename to the next steps
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
