<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
    <defs>
        <!-- Background Dark Gradient (Mac App Icon base) -->
        <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#2D323A"/>
            <stop offset="100%" stop-color="#1A1C22"/>
        </linearGradient>
        
        <!-- Trackpad Inner Gradient -->
        <linearGradient id="padGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3A3F49"/>
            <stop offset="100%" stop-color="#2C3038"/>
        </linearGradient>

        <linearGradient id="glowGradientUp" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stop-color="#0A84FF" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#0A84FF" stop-opacity="1"/>
        </linearGradient>

        <linearGradient id="glowGradientRight" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#30D158" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#30D158" stop-opacity="1"/>
        </linearGradient>

        <!-- Drop Shadow -->
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="24" stdDeviation="28" flood-opacity="0.35" />
        </filter>
        
        <!-- Edge Glow Effect -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="16" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Base Squircle -->
    <rect x="82" y="82" width="860" height="860" rx="192" ry="192" fill="url(#bgGradient)" filter="url(#dropShadow)"/>
    <rect x="82" y="82" width="860" height="860" rx="192" ry="192" fill="none" stroke="#454A54" stroke-width="4"/>

    <!-- Trackpad Surface -->
    <rect x="212" y="272" width="600" height="440" rx="36" ry="36" fill="url(#padGradient)" stroke="#5A616D" stroke-width="6"/>
    <!-- Trackpad Highlight -->
    <path d="M 248 275 L 776 275" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="4" stroke-linecap="round"/>

    <!-- Highlighted Edges -->
    <!-- Left Edge (Volume Up) -->
    <rect x="206" y="320" width="12" height="340" rx="6" fill="url(#glowGradientUp)" filter="url(#glow)"/>
    
    <!-- Bottom Edge -->
    <rect x="260" y="706" width="500" height="12" rx="6" fill="url(#glowGradientRight)" filter="url(#glow)"/>

    <!-- Arrow for Left Edge (Upwards Swipe) -->
    <path d="M 160 520 L 160 400" stroke="#0A84FF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
    <path d="M 130 430 L 160 400 L 190 430" stroke="#0A84FF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>

    <!-- Arrow for Bottom Edge (Rightwards Swipe) -->
    <path d="M 460 760 L 560 760" stroke="#30D158" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
    <path d="M 530 730 L 560 760 L 530 790" stroke="#30D158" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
    
    <!-- Title or little dot indicator purely for aesthetics -->
    <circle cx="512" cy="492" r="8" fill="#FFFFFF" opacity="0.1"/>
</svg>
